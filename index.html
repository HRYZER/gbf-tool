<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラブル素材計算ツール 完全版</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f6f8; }
.header { position:sticky; top:0; background:#222; color:white; padding:10px; z-index:10; }
.controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

.card { background:white; margin:10px; border-radius:10px; overflow:hidden; }
.cardHeader { background:#444; color:white; padding:8px; cursor:pointer; font-weight:bold; user-select:none; }
.cardBody { padding:10px; }

.row { display:grid; grid-template-columns:60px 1fr 80px; gap:5px; margin-bottom:8px; align-items:center; }
.lack { color:red; font-weight:bold; }
.barWrap { background:#ddd; border-radius:6px; margin-top:4px; }
.bar { height:14px; color:white; font-size:10px; text-align:center; border-radius:6px; }

.section { background:white; margin:10px; padding:10px; border-radius:10px; }
input { width:100%; }
</style>
</head>

<body>

<div class="header">
  <div>グラブル素材計算ツール 完全版</div>
  <div class="controls">
    <select id="chara"></select>
    <label><input type="checkbox" id="allView"> 全キャラ表示</label>
  </div>
</div>

<div id="app"></div>

<div class="section">
<h3>全キャラ合算</h3>
<div id="totalList"></div>
</div>

<div class="section">
<h3>不足素材ランキング</h3>
<div id="ranking"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

// キャラ
const CHARAS = [
{n:"ウーノ",e:"水",w:"槍",no:1},
{n:"ソーン",e:"光",w:"弓",no:2},
{n:"サラーサ",e:"土",w:"斧",no:3},
{n:"カトル",e:"水",w:"短剣",no:4},
{n:"フュンフ",e:"光",w:"杖",no:5},
{n:"シス",e:"闇",w:"格闘",no:6},
{n:"シエテ",e:"風",w:"剣",no:7},
{n:"オクトー",e:"土",w:"刀",no:8},
{n:"ニオ",e:"風",w:"楽器",no:9},
{n:"エッセル",e:"火",w:"銃",no:10}
];

// ===== 素材関数 =====
const getRings = e=>{
  if(e==="光") return [{name:"火の光輪",need:40},{name:"風の光輪",need:40}];
  if(e==="闇") return [{name:"水の光輪",need:40},{name:"土の光輪",need:40}];
  return [{name:e+"の光輪",need:80}];
};

const get140Anima = c=>{
  return [2,5,7,9,10].includes(c.no)
    ? {name:"黄龍のマグナアニマ",need:30}
    : {name:"黒麒麟のマグナアニマ",need:30};
};

const getMagna = e=>{
  return {
    "火":[{name:"シヴァのマグナアニマ",need:50}],
    "水":[{name:"エウロペのマグナアニマ",need:50}],
    "風":[{name:"グリームニルのマグナアニマ",need:50}],
    "土":[{name:"ゴブロのマグナアニマ",need:50}],
    "光":[{name:"メタトロンのマグナアニマ",need:50}],
    "闇":[{name:"アバターのマグナアニマ",need:50}]
  }[e] || [];
};

const getElementMats = c=>{
  return {
    "火":[{name:"ウィルナスの竜珠",need:300},{name:"イグニスブライト",need:30}],
    "水":[{name:"ワムデュスの竜珠",need:300},{name:"アクアブライト",need:30}],
    "風":[{name:"イーウィヤの竜珠",need:300},{name:"ウェントスブライト",need:30}],
    "土":[{name:"ガレオンの竜珠",need:300},{name:"テラブライト",need:30}],
    "光":[{name:"ルオーの竜珠",need:300},{name:"イグニスブライト",need:15},{name:"ウェントスブライト",need:15}],
    "闇":[{name:"フェディエルの竜珠",need:300},{name:"アクアブライト",need:15},{name:"テラブライト",need:15}]
  }[c.e];
};

const getSilverFragment = c=>[{name:`${c.w}の銀片`,need:200}];

const getElementSpecial = c=>{
  return {
    "火":[{name:"イグナイトラブル",need:50}],
    "水":[{name:"アビサルトラジェディ",need:50}],
    "土":[{name:"インシュラーコア",need:50}],
    "風":[{name:"ゲイルロック",need:50}],
    "光":[{name:"靂輪",need:50}],
    "闇":[{name:"トーデストリープ",need:50}]
  }[c.e] || [];
};

// ===== ステージ =====
function stages(c){
return [
{stage:110,materials:[
{name:"ヒヒイロカネ",need:1},
...getSilverFragment(c),
...getRings(c.e),
...getElementSpecial(c),
{name:"星晶の欠片",need:7500},
{name:c.e+"の宝珠",need:7500},
{name:c.e+"ジーン",need:7500},
{name:"朽ち果てた"+c.w,need:200},
{name:"ルピ",need:100000}
]},
{stage:120,materials:[
...getMagna(c.e),
...getElementSpecial(c),
{name:c.e+"のプシュケー",need:300},
{name:"バハムートの紫電角",need:100},
{name:`${c.no}番天星の欠片`,need:50},
{name:"究意の証",need:100},
{name:"蒼天の魂",need:1},
{name:"ルピ",need:5000000}
]},
{stage:130,materials:[
{name:"碧麗の証",need:1}
]},
{stage:140,materials:[
get140Anima(c),
{name:c.e+"属性エレメント",need:2000},
{name:c.w+"エレメント",need:2000},
...getElementMats(c),
{name:"真龍の金鱗",need:50},
{name:"ルピ",need:5000000}
]},
{stage:150,materials:[
{name:"終末の暗晶",need:30},
{name:"漆黒の棘翅",need:30},
{name:"狡知の魔角",need:30},
{name:"碧麗の証",need:1}
]}
];
}

// ===== 状態 =====
let state = JSON.parse(localStorage.getItem("gbf")) || {};
state.have ||= {};
state.levelOpen ||= {};

// ===== 色 =====
const color = p=> p<50?"#e53935":p<80?"#fb8c00":"#43a047";

// ===== 初期化 =====
function init(){
  const sel=document.getElementById("chara");
  CHARAS.forEach(c=> sel.innerHTML+=`<option>${c.n}</option>`);

  CHARAS.forEach(c=>{
    [110,120,130,140,150].forEach(lv=>{
      const key = c.n+"_"+lv;
      if(state.levelOpen[key]===undefined) state.levelOpen[key]=true;
    });
  });
}

// ===== 描画 =====
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const all=document.getElementById("allView").checked;
  const selected=document.getElementById("chara").value;

  const targets = all ? CHARAS : CHARAS.filter(c=>c.n===selected);

  targets.forEach(c=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`<div class="cardHeader">${c.no}. ${c.n}（${c.e}）</div>`;
    const body=document.createElement("div");
    body.className="cardBody";

    stages(c).forEach(stage=>{
      const keyLv = c.n+"_"+stage.stage;

      const lvHeader=document.createElement("div");
      lvHeader.className="cardHeader";
      lvHeader.innerHTML=`Lv${stage.stage} ${state.levelOpen[keyLv]?"▼":"▶"}`;
      lvHeader.onclick=()=>{
        state.levelOpen[keyLv]=!state.levelOpen[keyLv];
        render();
      };

      body.appendChild(lvHeader);

      if(state.levelOpen[keyLv]){
        stage.materials.forEach(mat=>{
          const key=c.n+"_"+mat.name.replace(/\s/g,"");
          const have=state.have[key]||0;
          const lack=Math.max(0,mat.need-have);
          const p=Math.min(100,Math.floor(have/mat.need*100));

          const row=document.createElement("div");
          row.className="row";

          row.innerHTML=`
            <div>${mat.need}</div>
            <div>${mat.name}<br>
              <input type="number" value="${have}"
              onchange="update('${key}',this.value)"
              onwheel="this.blur()">
              <div class="barWrap">
                <div class="bar" style="width:${p}%;background:${color(p)}">
                ${have}/${mat.need}
                </div>
              </div>
            </div>
            <div class="${lack>0?'lack':''}">${lack}</div>
          `;
          body.appendChild(row);
        });
      }
    });

    card.appendChild(body);
    app.appendChild(card);
  });

  renderTotal();
  localStorage.setItem("gbf",JSON.stringify(state));
}

// ===== 更新 =====
window.update=(k,v)=>{
  state.have[k]=Math.max(0,Number(v)||0);
  render();
};

// ===== 合算 =====
function renderTotal(){
  const total={}, ranking=[];

  CHARAS.forEach(c=>{
    stages(c).forEach(s=>{
      s.materials.forEach(m=>{
        const key=c.n+"_"+m.name.replace(/\s/g,"");
        total[m.name] ||= {need:0,have:0};
        total[m.name].need+=m.need;
        total[m.name].have+=state.have[key]||0;
      });
    });
  });

  const list=document.getElementById("totalList");
  const rank=document.getElementById("ranking");
  list.innerHTML="";
  rank.innerHTML="";

  Object.entries(total).forEach(([n,v])=>{
    const lack=Math.max(0,v.need-v.have);
    list.innerHTML+=`<div>${n}：${v.have}/${v.need}（不足 ${lack}）</div>`;
    if(lack>0) ranking.push({n,lack});
  });

  ranking.sort((a,b)=>b.lack-a.lack);
  ranking.forEach(x=> rank.innerHTML+=`<div>${x.n}：不足 ${x.lack}</div>`);
}

// ===== イベント =====
document.getElementById("chara").onchange=render;
document.getElementById("allView").onchange=render;

// ===== 起動 =====
init();
render();

});
</script>

</body>
</html>
