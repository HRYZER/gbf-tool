<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラブル素材計算ツール 完成版</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f6f8; }
.header { position:sticky; top:0; background:#222; color:white; padding:10px; }
.controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

.card { background:white; margin:10px; border-radius:10px; overflow:hidden; }
.cardHeader { background:#444; color:white; padding:8px; cursor:pointer; font-weight:bold; }
.cardBody { padding:10px; }

.row { display:grid; grid-template-columns:60px 1fr 70px; gap:5px; margin-bottom:8px; align-items:center; }
.lack { color:red; font-weight:bold; }
.barWrap { background:#ddd; border-radius:6px; margin-top:4px; }
.bar { height:14px; color:white; font-size:10px; text-align:center; border-radius:6px; }

.section { background:white; margin:10px; padding:10px; border-radius:10px; }
input { width:100%; }
</style>
</head>

<body>

<div class="header">
  <div>グラブル素材計算ツール 完成版</div>
  <div class="controls">
    <select id="chara"></select>
    <label><input type="checkbox" id="allView"> 全キャラ表示</label>
  </div>
</div>

<div id="app"></div>

<div class="section">
<h3>全キャラ合算</h3>
<div id="totalList"></div>
</div>

<div class="section">
<h3>不足素材ランキング</h3>
<div id="ranking"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

// キャラ
const CHARAS = [
{n:"ウーノ",e:"水",w:"槍",no:1},
{n:"ソーン",e:"光",w:"弓",no:2},
{n:"サラーサ",e:"土",w:"斧",no:3},
{n:"カトル",e:"水",w:"短剣",no:4},
{n:"フュンフ",e:"光",w:"杖",no:5},
{n:"シス",e:"闇",w:"格闘",no:6},
{n:"シエテ",e:"風",w:"剣",no:7},
{n:"オクトー",e:"土",w:"刀",no:8},
{n:"ニオ",e:"風",w:"楽器",no:9},
{n:"エッセル",e:"火",w:"銃",no:10}
];

// 光輪
function getRings(e){
  if(e==="光") return [{name:"火の光輪",need:40},{name:"風の光輪",need:40}];
  if(e==="闇") return [{name:"水の光輪",need:40},{name:"土の光輪",need:40}];
  return [{name:e+"の光輪",need:80}];
}

// 黄龍 / 黒麒麟
function get140Anima(c){
  const g1=[2,5,7,9,10];
  return g1.includes(c.no)
    ? {name:"黄龍のマグナアニマ",need:30}
    : {name:"黒麒麟のマグナアニマ",need:30};
}

// 属性素材
function getElementMats(c){
  const map={
    "火":[{name:"シヴァのマグナアニマ",need:20},{name:"ウィルナスの竜珠",need:30},{name:"イグニスブライト",need:20}],
    "水":[{name:"エウロペのマグナアニマ",need:20},{name:"ワムデュスの竜珠",need:30},{name:"アクアブライト",need:20}],
    "風":[{name:"グリームニルのマグナアニマ",need:20},{name:"イーウィヤの鱗",need:30},{name:"ウェントスブライト",need:20}],
    "土":[{name:"ゴブロのマグナアニマ",need:20},{name:"ガレオンの竜珠",need:30},{name:"テラブライト",need:20}],
    "光":[{name:"メタトロンのマグナアニマ",need:20},{name:"ルオーの竜珠",need:30},{name:"イグニスブライト",need:15},{name:"ウェントスブライト",need:15}],
    "闇":[{name:"アバターのマグナアニマ",need:20},{name:"フェディエルの竜珠",need:30},{name:"アクアブライト",need:15},{name:"テラブライト",need:15}]
  };
  return map[c.e];
}

// 素材
function stages(c){
return [
{stage:110,materials:[
{name:"ヒヒイロカネ",need:1},
{name:"銀の依代の欠片",need:200},
...(getRings(c.e) || []),
{name:"星晶の欠片",need:7500},
{name:c.e+"の宝珠",need:7500},
{name:c.e+"ジーン",need:7500},
{name:"朽ち果てた"+c.w,need:3},
{name:"ルピ",need:100000}
]},
{stage:120,materials:[
{name:"マグナアニマ",need:50},
{name:c.e+"のプシュケー",need:300},
{name:"バハムートの紫電角",need:100},
{name:"番天星の欠片",need:50},
{name:"究意の証",need:100},
{name:"蒼天の魂",need:1},
{name:"ルピ",need:5000000}
]},
{stage:130,materials:[
{name:"碧麗の証",need:1}
]},
{stage:140,materials:[
...(get140Anima(c) ? [get140Anima(c)] : []),
{name:c.e+"エレメント",need:2000},
{name:(c.w || "")+"エレメント",need:2000},
...(getElementMats(c) || []),
{name:"真龍の金鱗",need:50},
{name:"ルピ",need:5000000}
]},
{stage:150,materials:[
{name:"終末の暗晶",need:30},
{name:"漆黒の棘翅",need:30},
{name:"狡知の魔角",need:30},
{name:"碧麗の証",need:1}
]}
];
}

// 状態
let state = JSON.parse(localStorage.getItem("gbf")) || {};

state.have = state.have || {};
state.open = state.open || {};
state.levelOpen = state.levelOpen || {};

// 色
function color(p){
  if(p<50) return "#e53935";
  if(p<80) return "#fb8c00";
  return "#43a047";
}

// 初期化
function init(){
  const sel=document.getElementById("chara");

  CHARAS.forEach(c=>{
    sel.innerHTML+=`<option value="${c.n}">${c.n}</option>`;
  });

  sel.value = CHARAS[0].n;

  // レベル開閉の初期化
  [110,120,130,140,150].forEach(lv=>{
    if(state.levelOpen[lv] === undefined){
      state.levelOpen[lv] = true;
    }
  });
}

// 開閉
function toggleLevel(lv){
  state.levelOpen[lv] = !state.levelOpen[lv];
  render();
}

// 描画
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const all=document.getElementById("allView").checked;
  const selected=document.getElementById("chara").value;

  let targets = all
    ? CHARAS
    : [CHARAS.find(x=>x.n===selected) || CHARAS[0]];

  targets.forEach(c=>{
    const card=document.createElement("div");
    card.className="card";

    const header=document.createElement("div");
    header.className="cardHeader";
    header.innerHTML=`${c.no}. ${c.n}（${c.e}）`;
    card.appendChild(header);

    const body=document.createElement("div");
    body.className="cardBody";

    stages(c).forEach(stage=>{

      // ★ レベルヘッダー（開閉）
      const lvHeader = document.createElement("div");
      lvHeader.className = "cardHeader";
      lvHeader.style.marginTop = "8px";
      lvHeader.innerHTML = `Lv${stage.stage} ${state.levelOpen[stage.stage]?"▼":"▶"}`;

      lvHeader.onclick = () => toggleLevel(stage.stage);

      body.appendChild(lvHeader);

      // 開いているときだけ表示
      if(state.levelOpen[stage.stage]){

        stage.materials.forEach(mat=>{
          const key=c.n+"_"+mat.name;
          const have=state.have[key]||0;
          const lack=Math.max(0,mat.need-have);
          const p=Math.min(100,Math.floor(have/mat.need*100));

          const row=document.createElement("div");
          row.className="row";

          row.innerHTML=`
            <div>${mat.need}</div>
            <div>${mat.name}<br>
              <input type="number" value="${have}" oninput="update('${key}',this.value)">
              <div class="barWrap">
                <div class="bar" style="width:${p}%;background:${color(p)}">${p}%</div>
              </div>
            </div>
            <div class="${lack>0?'lack':''}">${lack}</div>
          `;

          body.appendChild(row);
        });

      }

    });

    card.appendChild(body);
    app.appendChild(card);
  });

  renderTotal();
  localStorage.setItem("gbf",JSON.stringify(state));
}
// 更新
function update(k,v){
  state.have[k]=Math.max(0,Number(v)||0);
  render();
}

// 合算
function calcAll(){
  const t={};
  CHARAS.forEach(c=>{
    stages(c).forEach(s=>{
      s.materials.forEach(m=>{
        if(!t[m.name]) t[m.name]={need:0,have:0};
        t[m.name].need+=m.need;
        t[m.name].have+=state.have[c.n+"_"+m.name]||0;
      });
    });
  });
  return t;
}

// 合算表示
function renderTotal(){
  const t=calcAll();

  const totalList=document.getElementById("totalList");
  const ranking=document.getElementById("ranking");

  totalList.innerHTML="";
  ranking.innerHTML="";

  let arr=[];

  Object.keys(t).forEach(n=>{
    const lack=Math.max(0,t[n].need-t[n].have);
    totalList.innerHTML+=`<div>${n}：${t[n].have}/${t[n].need}（不足 ${lack}）</div>`;
    if(lack>0) arr.push({n,lack});
  });

  arr.sort((a,b)=>b.lack-a.lack);
  arr.forEach(x=>ranking.innerHTML+=`<div>${x.n}：不足 ${x.lack}</div>`);
}

// イベント
document.getElementById("chara").onchange=render;
document.getElementById("allView").onchange=render;

  // 初期化
  init();
  render();
});
</script>

</body>

</html>
